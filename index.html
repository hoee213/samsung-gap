<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>삼성전자 우선주 괴리율</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
    .spinner {
      border: 3px solid #334155; border-top-color: #60a5fa;
      border-radius: 50%; width: 32px; height: 32px;
      animation: spin 0.8s linear infinite; margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .range-btn { transition: color 0.15s, border-color 0.15s; }
    .pulse { animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<div class="max-w-5xl mx-auto">

  <!-- 헤더 -->
  <div class="flex items-start justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-white">삼성전자 우선주 괴리율</h1>
      <p class="text-slate-400 text-sm mt-1">
        005930 (보통주) vs 005935 (우선주) &nbsp;·&nbsp;
        괴리율 = (보통주 − 우선주) / 보통주 × 100
      </p>
    </div>
    <div class="text-right flex-shrink-0 ml-4">
      <div id="updated" class="text-slate-500 text-xs">로딩 중...</div>
      <button id="refresh-btn" onclick="refreshCurrentPrices()"
        class="mt-1 text-xs text-blue-400 hover:text-blue-300 underline disabled:opacity-40 disabled:cursor-not-allowed">
        새로고침
      </button>
    </div>
  </div>

  <!-- 현재 수치 카드 -->
  <div id="stat-section" class="hidden">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      <div class="card p-4">
        <div class="text-slate-400 text-xs mb-1">삼성전자 (보통주)</div>
        <div id="s-common" class="text-xl font-bold text-white">—</div>
        <div class="text-xs text-slate-500 mt-0.5">005930.KS</div>
      </div>
      <div class="card p-4">
        <div class="text-slate-400 text-xs mb-1">삼성전자우 (우선주)</div>
        <div id="s-pref" class="text-xl font-bold text-white">—</div>
        <div class="text-xs text-slate-500 mt-0.5">005935.KS</div>
      </div>
      <div class="card p-4 border-blue-500/40">
        <div class="text-slate-400 text-xs mb-1 flex items-center gap-1">
          현재 괴리율
          <span id="freshness-badge" class="text-slate-500 text-xs"></span>
        </div>
        <div id="s-gap" class="text-2xl font-bold">—</div>
        <div class="text-xs text-slate-500 mt-0.5">보통주 기준 할인율</div>
      </div>
      <div class="card p-4">
        <div class="text-slate-400 text-xs mb-1">10년 괴리율 범위</div>
        <div id="s-range" class="text-sm font-semibold text-white">—</div>
        <div id="s-avg" class="text-xs text-slate-400 mt-1">평균: —</div>
      </div>
    </div>

    <!-- 괴리율 차트 -->
    <div class="card p-5 mb-6">
      <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
        <h2 class="text-sm font-semibold text-slate-300">괴리율 추이 (10년)</h2>
        <div class="flex gap-1.5 flex-wrap">
          <button onclick="setRange(90)"   id="btn-90"   class="range-btn px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 hover:text-white">3개월</button>
          <button onclick="setRange(365)"  id="btn-365"  class="range-btn px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 hover:text-white">1년</button>
          <button onclick="setRange(1095)" id="btn-1095" class="range-btn px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 hover:text-white">3년</button>
          <button onclick="setRange(1825)" id="btn-1825" class="range-btn px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 hover:text-white">5년</button>
          <button onclick="setRange(0)"    id="btn-all"  class="range-btn px-3 py-1 text-xs rounded-full border border-blue-500 text-blue-400">전체</button>
        </div>
      </div>
      <div style="height:280px; position:relative;">
        <canvas id="gapChart"></canvas>
      </div>
    </div>

    <!-- 주가 비교 차트 -->
    <div class="card p-5 mb-6">
      <h2 class="text-sm font-semibold text-slate-300 mb-4">주가 비교 (10년)</h2>
      <div style="height:240px; position:relative;">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <!-- 최근 30일 테이블 -->
    <div class="card p-5">
      <h2 class="text-sm font-semibold text-slate-300 mb-4">최근 30일</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-slate-400 border-b border-slate-700">
              <th class="text-left py-2 pr-4">날짜</th>
              <th class="text-right py-2 pr-4">보통주</th>
              <th class="text-right py-2 pr-4">우선주</th>
              <th class="text-right py-2 pr-4">괴리율</th>
              <th class="text-right py-2">차이 (원)</th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-slate-800"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 초기 로딩 -->
  <div id="loading"><div class="spinner"></div></div>

  <!-- 에러 -->
  <div id="error" class="hidden text-center text-slate-400 py-20">
    데이터를 불러올 수 없습니다.<br>
    <span class="text-xs">GitHub Actions가 아직 실행되지 않았거나 네트워크 오류입니다.</span>
  </div>
</div>

<script>
/* ── 상태 ── */
let allHistory = [];
let gapChart = null;
let priceChart = null;
let activeRange = 0;          // 0 = 전체
const RANGE_BTNS = [90, 365, 1095, 1825, 0];  // 0 = 전체

/* ── 유틸 ── */
const fmt = n => n.toLocaleString('ko-KR') + '원';

function gapColor(gap) {
  if (gap > 30) return '#f87171';
  if (gap > 20) return '#fb923c';
  if (gap > 10) return '#facc15';
  return '#60a5fa';
}

function toKST(isoStr) {
  const dt = new Date(isoStr);
  return new Date(dt.getTime() + 9 * 3600 * 1000)
    .toISOString().replace('T', ' ').slice(0, 16) + ' KST';
}

/* ── 경과 시간 표시 ── */
function minutesAgo(isoStr) {
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 60000);
  if (diff < 1)  return '방금 전';
  if (diff < 60) return `${diff}분 전`;
  const h = Math.floor(diff / 60);
  return `${h}시간 전`;
}

/* ── 현재가 카드 업데이트 ── */
function updateCurrentCards(commonPrice, prefPrice, updatedAt) {
  document.getElementById('s-common').textContent = fmt(commonPrice);
  document.getElementById('s-pref').textContent   = fmt(prefPrice);

  const gap = (commonPrice - prefPrice) / commonPrice * 100;
  const gapEl = document.getElementById('s-gap');
  gapEl.textContent = gap.toFixed(2) + '%';
  gapEl.style.color = gapColor(gap);

  document.getElementById('freshness-badge').textContent = minutesAgo(updatedAt);
  document.getElementById('updated').textContent = '기준: ' + toKST(updatedAt);
}

/* ── 새로고침 버튼 핸들러 ── */
async function refreshCurrentPrices() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '갱신 중...';
  btn.classList.add('pulse');

  try {
    const r = await fetch('data/prices.json', { cache: 'no-store' });
    if (!r.ok) throw new Error('fetch failed');
    const data = await r.json();
    updateCurrentCards(data.current.common, data.current.pref, data.updated_at);
  } catch (_) {
    document.getElementById('updated').textContent = '갱신 실패 — 잠시 후 다시 시도';
  }

  btn.disabled = false;
  btn.textContent = '새로고침';
  btn.classList.remove('pulse');
}

/* ── 초기 전체 로드 ── */
async function loadData() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('stat-section').classList.add('hidden');
  document.getElementById('error').classList.add('hidden');

  try {
    const r = await fetch('data/prices.json', { cache: 'no-store' });
    if (!r.ok) throw new Error('fetch failed');
    const data = await r.json();
    if (!data.history || data.history.length === 0) throw new Error('empty');

    allHistory = data.history;

    /* 통계 카드 */
    updateCurrentCards(data.current.common, data.current.pref, data.updated_at);
    renderStatsCard(data.stats);

    /* 테이블 */
    renderTable(allHistory.slice(-30).reverse());

    /* 차트 (첫 렌더) */
    renderCharts(allHistory);
    setRange(activeRange);

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('stat-section').classList.remove('hidden');

  } catch (e) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
    console.error(e);
  }
}

function renderStatsCard(stats) {
  document.getElementById('s-range').innerHTML =
    `<span style="color:#60a5fa">${stats.gap_min.toFixed(2)}%</span>` +
    ` ~ <span style="color:#f87171">${stats.gap_max.toFixed(2)}%</span>`;
  document.getElementById('s-avg').textContent = `평균: ${stats.gap_avg.toFixed(2)}%`;
}

function renderTable(rows) {
  document.getElementById('table-body').innerHTML = rows.map(r => {
    const diff = r.common - r.pref;
    const color = gapColor(r.gap);
    return `<tr class="hover:bg-slate-800/50">
      <td class="py-2 pr-4 text-slate-400">${r.date}</td>
      <td class="py-2 pr-4 text-right">${r.common.toLocaleString()}</td>
      <td class="py-2 pr-4 text-right">${r.pref.toLocaleString()}</td>
      <td class="py-2 pr-4 text-right font-semibold" style="color:${color}">${r.gap.toFixed(2)}%</td>
      <td class="py-2 text-right text-slate-400">${diff.toLocaleString()}</td>
    </tr>`;
  }).join('');
}

/* ── 범위 필터 (calendar days) ── */
function sliceHistory(calDays) {
  if (calDays === 0) return allHistory;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - calDays);
  const cutStr = cutoff.toISOString().slice(0, 10);
  return allHistory.filter(r => r.date >= cutStr);
}

function setRange(calDays) {
  activeRange = calDays;
  RANGE_BTNS.forEach(d => {
    const id = d === 0 ? 'btn-all' : `btn-${d}`;
    const el = document.getElementById(id);
    if (!el) return;
    if (d === calDays) {
      el.className = 'range-btn px-3 py-1 text-xs rounded-full border border-blue-500 text-blue-400';
    } else {
      el.className = 'range-btn px-3 py-1 text-xs rounded-full border border-slate-600 text-slate-400 hover:text-white';
    }
  });

  const rows = sliceHistory(calDays);
  const unit = calDays <= 100 ? 'day' : calDays <= 400 ? 'month' : 'year';
  updateGapChart(rows, unit);
  updatePriceChart(rows, unit);
}

/* ── 차트 ── */
const BASE_SCALE = {
  x: {
    type: 'time',
    time: { unit: 'year', displayFormats: { day: 'MM.dd', month: 'yy.MM', year: 'yyyy' } },
    ticks: { color: '#64748b', maxTicksLimit: 10 },
    grid: { color: '#1e293b' },
  },
  y: {
    ticks: { color: '#64748b' },
    grid: { color: '#1e293b' },
  },
};

function renderCharts(rows) {
  gapChart = new Chart(
    document.getElementById('gapChart').getContext('2d'),
    {
      type: 'line',
      data: { datasets: [buildGapDataset(rows)] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#94a3b8', font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => ` 괴리율: ${ctx.parsed.y.toFixed(2)}%` } },
        },
        scales: {
          x: { ...BASE_SCALE.x },
          y: { ...BASE_SCALE.y, ticks: { color: '#64748b', callback: v => v.toFixed(1) + '%' } },
        },
      },
    }
  );

  priceChart = new Chart(
    document.getElementById('priceChart').getContext('2d'),
    {
      type: 'line',
      data: { datasets: buildPriceDatasets(rows) },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#94a3b8', font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}원` } },
        },
        scales: {
          x: { ...BASE_SCALE.x },
          y: { ...BASE_SCALE.y, ticks: { color: '#64748b', callback: v => (v / 1000).toFixed(0) + 'K' } },
        },
      },
    }
  );
}

function buildGapDataset(rows) {
  return {
    label: '괴리율 (%)',
    data: rows.map(r => ({ x: r.date, y: r.gap })),
    borderColor: '#60a5fa',
    backgroundColor: 'rgba(96,165,250,0.07)',
    borderWidth: 1.5, pointRadius: 0, tension: 0.2, fill: true,
  };
}

function buildPriceDatasets(rows) {
  return [
    {
      label: '보통주 (005930)',
      data: rows.map(r => ({ x: r.date, y: r.common })),
      borderColor: '#f87171', borderWidth: 1.5, pointRadius: 0, tension: 0.2,
    },
    {
      label: '우선주 (005935)',
      data: rows.map(r => ({ x: r.date, y: r.pref })),
      borderColor: '#34d399', borderWidth: 1.5, pointRadius: 0, tension: 0.2,
    },
  ];
}

function updateGapChart(rows, unit) {
  if (!gapChart) return;
  gapChart.data.datasets[0] = buildGapDataset(rows);
  gapChart.options.scales.x.time.unit = unit;
  gapChart.update();
}

function updatePriceChart(rows, unit) {
  if (!priceChart) return;
  priceChart.data.datasets = buildPriceDatasets(rows);
  priceChart.options.scales.x.time.unit = unit;
  priceChart.update();
}

loadData();
</script>
</body>
</html>
